<!DOCTYPE html>
<html>

<head>
<title>Bus Reservation</title>

<style>

body{
background:linear-gradient(135deg,#1d2671,#c33764);
font-family:Arial;
text-align:center;
color:white;
}

.box{
background:white;
color:black;
width:600px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
background:#1d2671;
color:white;
border:none;
border-radius:5px;
}

/* BUS LAYOUT */

.seat{
width:50px;
height:50px;
background:green;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:6px;
font-size:14px;
}

.selected{
background:orange;
}

.booked{
background:gray;
cursor:not-allowed;
}

.bus{
display:grid;
grid-template-columns:50px 50px 20px 50px 50px;
gap:8px;
justify-content:center;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Bus Reservation System</h1>

<div class="box">

<button onclick="showBook()">Book</button>
<button onclick="cancel()">Cancel</button>
<button onclick="search()">Search</button>
<button onclick="report()">Report</button>

<div id="ui"></div>

</div>

<script src="index.js"></script>
<script src="ui.js"></script>

</body>
</html>
