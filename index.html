<!DOCTYPE html>
<html>
<head>
<title>Bus Reservation System</title>

<style>

body
{
    font-family: Arial;
    background: linear-gradient(135deg,#1d2671,#c33764);
    color:white;
    text-align:center;
}

.container
{
    background:white;
    color:black;
    width:600px;
    margin:auto;
    margin-top:40px;
    padding:20px;
    border-radius:10px;
}

button
{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#1d2671;
    color:white;
    cursor:pointer;
}

select,input
{
    padding:8px;
    margin:5px;
}

.grid
{
    display:grid;
    grid-template-columns:repeat(4,60px);
    gap:10px;
    justify-content:center;
    margin-top:10px;
}

.seat
{
    width:60px;
    height:60px;
    background:green;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.selected
{
    background:orange;
}

</style>
</head>

<body>

<h1>Bus Ticket System</h1>

<div class="container">

<button onclick="showBook()">Book</button>
<button onclick="cancel()">Cancel</button>
<button onclick="search()">Search</button>
<button onclick="report()">Report</button>

<div id="ui"></div>

</div>

<script src="index.js"></script>
<script src="ui.js"></script>

</body>
</html>
