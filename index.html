<!DOCTYPE html>
<html>

<head>
<title>Bus Reservation</title>

<style>

body{
background:linear-gradient(135deg,#1d2671,#c33764);
font-family:Arial;
text-align:center;
color:white;
}

.box{
background:white;
color:black;
width:650px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
background:#1d2671;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.seat{
width:60px;
height:60px;
background:green;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:6px;
}

.selected{
background:orange;
}

.booked{
background:gray;

.bus{
display:grid;
grid-template-columns:50px 50px 20px 50px 50px;
gap:8px;
justify-content:center;
margin-top:20px;
}
}

#output{
margin-top:20px;
text-align:left;
white-space:pre-line;
font-size:14px;
}

</style>

</head>

<body>

<h1>Bus Reservation System</h1>

<div class="box">

<button onclick="showBook()">Book</button>
<button onclick="cancel()">Cancel</button>
<button onclick="search()">Search</button>
<button onclick="report()">Report</button>

<div id="ui"></div>

<div id="output"></div>

</div>

<script src="index.js"></script>
<script src="ui.js"></script>

</body>
</html>
